<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise SPM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-50 p-10 font-sans">
    <div class="max-w-5xl mx-auto main-container">
        <h1 class="text-3xl font-bold text-slate-800">Supplier Performance Command Center</h1>
        <p class="text-slate-500 mb-6">Ather Energy: Multi-Criteria AHP Decision Engine</p>
        <hr class="mb-8 border-slate-300">

        <!-- NEW: Dynamic Supplier Entry Form -->
        <div class="bg-white p-6 rounded shadow mb-8 border-t-4 border-green-600">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Add New Equipment Vendor</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <input type="text" id="new_vendor" placeholder="Vendor Name" class="border p-2 rounded text-sm">
                <input type="number" id="new_capex" placeholder="Base Capex (₹)" class="border p-2 rounded text-sm">
                <input type="number" id="new_amc" placeholder="Total AMC (₹)" class="border p-2 rounded text-sm">
                <input type="number" id="new_battery" placeholder="Battery Cost (₹)" class="border p-2 rounded text-sm">
                <input type="number" id="new_lead" placeholder="Lead Time (Weeks)" class="border p-2 rounded text-sm">
                <input type="number" id="new_tech" placeholder="Tech Score (1-100)" class="border p-2 rounded text-sm">
                <div class="flex items-center space-x-2 border p-2 rounded bg-slate-50">
                    <input type="checkbox" id="new_safety" class="w-4 h-4 cursor-pointer">
                    <label class="text-sm font-bold text-slate-700">Auto-Decel</label>
                </div>
                <button onclick="addNewSupplier()" class="bg-green-600 text-white font-bold py-2 px-4 rounded shadow hover:bg-green-700 transition">
                    + Add Vendor
                </button>
            </div>
            <p id="supplier_msg" class="text-sm text-green-600 font-bold hidden">Vendor added successfully! Click Execute to run math.</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded shadow border-t-4 border-blue-600">
                <label class="block text-sm font-bold mb-2 text-slate-700">Cost Priority</label>
                <input type="range" id="w_cost" min="0" max="1" step="0.1" value="0.4" class="w-full cursor-pointer" oninput="updateVal('cost_val', this.value)">
                <span id="cost_val" class="text-sm text-blue-600 font-extrabold">0.4</span>
            </div>
            <div class="bg-white p-4 rounded shadow border-t-4 border-blue-600">
                <label class="block text-sm font-bold mb-2 text-slate-700">Tech Priority</label>
                <input type="range" id="w_tech" min="0" max="1" step="0.1" value="0.3" class="w-full cursor-pointer" oninput="updateVal('tech_val', this.value)">
                <span id="tech_val" class="text-sm text-blue-600 font-extrabold">0.3</span>
            </div>
            <div class="bg-white p-4 rounded shadow border-t-4 border-blue-600">
                <label class="block text-sm font-bold mb-2 text-slate-700">Delivery Priority</label>
                <input type="range" id="w_delivery" min="0" max="1" step="0.1" value="0.2" class="w-full cursor-pointer" oninput="updateVal('delivery_val', this.value)">
                <span id="delivery_val" class="text-sm text-blue-600 font-extrabold">0.2</span>
            </div>
            <div class="bg-white p-4 rounded shadow border-t-4 border-blue-600">
                <label class="block text-sm font-bold mb-2 text-slate-700">Safety Priority</label>
                <input type="range" id="w_safety" min="0" max="1" step="0.1" value="0.1" class="w-full cursor-pointer" oninput="updateVal('safety_val', this.value)">
                <span id="safety_val" class="text-sm text-blue-600 font-extrabold">0.1</span>
            </div>
        </div>

        <div class="flex space-x-4 mb-8">
            <button onclick="runAHP()" class="w-2/3 bg-blue-700 text-white font-bold py-3 px-4 rounded shadow hover:bg-blue-800 transition">
                Execute Multi-Criteria Math
            </button>
            <button onclick="downloadPDF()" class="w-1/3 bg-slate-800 text-white font-bold py-3 px-4 rounded shadow hover:bg-slate-900 transition flex justify-center items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Export PDF
            </button>
        </div>

        <div class="bg-white p-6 rounded shadow mt-8">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Live Vendor Rankings (Out of 100)</h2>
            <canvas id="ahpChart" height="100"></canvas>
        </div>

        <div class="bg-white p-6 rounded shadow mt-8">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Decision Audit Log</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm text-left text-slate-600">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                        <tr>
                            <th class="px-4 py-3">Timestamp</th>
                            <th class="px-4 py-3">Cost</th>
                            <th class="px-4 py-3">Tech</th>
                            <th class="px-4 py-3">Delivery</th>
                            <th class="px-4 py-3">Safety</th>
                            <th class="px-4 py-3">Top Supplier (Score)</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // *** SECURITY CONFIGURATION ***
        const API_TOKEN = "YOUR_SECRET_PASSWORD"; 
        
        let chartInstance = null;
        
        // Dynamic Supplier Array (Starts with baseline defaults)
        let currentSuppliers = [
            { vendor_name: "Godrej (Domestic)", base_capex: 1450000, total_amc: 180000, battery_cost: 250000, lead_time_weeks: 8, tech_score: 78, has_auto_decel: false },
            { vendor_name: "Toyota (Premium)", base_capex: 2100000, total_amc: 220000, battery_cost: 0, lead_time_weeks: 14, tech_score: 95, has_auto_decel: true },
            { vendor_name: "Linde (Global)", base_capex: 1950000, total_amc: 250000, battery_cost: 0, lead_time_weeks: 12, tech_score: 92, has_auto_decel: true },
            { vendor_name: "Jost's Engineering", base_capex: 1150000, total_amc: 140000, battery_cost: 200000, lead_time_weeks: 6, tech_score: 65, has_auto_decel: false },
            { vendor_name: "Crown Equipment", base_capex: 1850000, total_amc: 195000, battery_cost: 225000, lead_time_weeks: 10, tech_score: 88, has_auto_decel: true }
        ];

        function addNewSupplier() {
            const name = document.getElementById('new_vendor').value;
            const capex = parseFloat(document.getElementById('new_capex').value);
            const amc = parseFloat(document.getElementById('new_amc').value);
            const battery = parseFloat(document.getElementById('new_battery').value);
            const lead = parseInt(document.getElementById('new_lead').value);
            const tech = parseInt(document.getElementById('new_tech').value);
            const safety = document.getElementById('new_safety').checked;

            if(!name || isNaN(capex) || isNaN(amc) || isNaN(battery) || isNaN(lead) || isNaN(tech)) {
                alert("Please fill out all numeric fields correctly.");
                return;
            }

            // Inject new vendor into the array
            currentSuppliers.push({
                vendor_name: name,
                base_capex: capex,
                total_amc: amc,
                battery_cost: battery,
                lead_time_weeks: lead,
                tech_score: tech,
                has_auto_decel: safety
            });

            // Clear inputs for the next entry
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(el => el.value = '');
            document.getElementById('new_safety').checked = false;

            // Show brief success message
            const msg = document.getElementById('supplier_msg');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }

        function updateVal(id, val) {
            document.getElementById(id).innerText = val;
        }

        async function runAHP() {
            const weights = {
                weight_cost: parseFloat(document.getElementById('w_cost').value),
                weight_tech: parseFloat(document.getElementById('w_tech').value),
                weight_delivery: parseFloat(document.getElementById('w_delivery').value),
                weight_safety: parseFloat(document.getElementById('w_safety').value)
            };
            
            try {
                const response = await fetch('https://spm-api-backend.onrender.com/api/v1/rank-suppliers', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_TOKEN}`
                    },
                    // Now sending the dynamic array instead of hardcoded data!
                    body: JSON.stringify({ suppliers: currentSuppliers, ...weights })
                });
                
                const result = await response.json();
                if(result.status === 'success') {
                    drawChart(result.data);
                    fetchHistory();
                }
            } catch (error) {
                alert("Connection failed. Check if the Render API is live.");
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch('https://spm-api-backend.onrender.com/api/v1/history', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${API_TOKEN}` }
                });
                const result = await response.json();
                if(result.status === 'success') populateTable(result.data);
            } catch (error) { console.error("Failed to load history."); }
        }

        function populateTable(historyData) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = ''; 
            historyData.forEach(log => {
                const weights = JSON.parse(log.weights_json);
                const results = JSON.parse(log.results_json);
                const topSupplier = results[0];
                const date = new Date(log.timestamp).toLocaleString();
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="px-4 py-3 font-medium text-slate-900">${date}</td>
                    <td class="px-4 py-3">${weights.weight_cost}</td>
                    <td class="px-4 py-3">${weights.weight_tech}</td>
                    <td class="px-4 py-3">${weights.weight_delivery}</td>
                    <td class="px-4 py-3">${weights.weight_safety}</td>
                    <td class="px-4 py-3 font-bold text-blue-600">${topSupplier.vendor_name} (${topSupplier.final_ahp_score.toFixed(1)})</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function drawChart(data) {
            const labels = data.map(d => d.vendor_name);
            const scores = data.map(d => d.final_ahp_score);
            const ctx = document.getElementById('ahpChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Total AHP Score', data: scores, backgroundColor: '#1d4ed8' }]
                },
                options: { scales: { y: { beginAtZero: true, max: 100 } }, animation: { duration: 800 } }
            });
        }
        
        function downloadPDF() {
            const element = document.querySelector('.main-container');
            const opt = {
                margin:       0.5,
                filename:     `SPM_Audit_Report_${new Date().toISOString().split('T')[0]}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        window.onload = () => {
            runAHP();
            fetchHistory();
        };
    </script>
</body>
</html>
